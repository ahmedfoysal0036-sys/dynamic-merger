<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Key Merger - Phase 3.1 (Pro)</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b131e; color: #e1e8ed; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #15202b; padding: 25px; border-radius: 15px; border: 1px solid #00d2ff; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00d2ff; text-align: center; margin-bottom: 25px; }
        .upload-group { margin-bottom: 20px; border-left: 4px solid #00d2ff; padding-left: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input { background: #192734; color: white; border: 1px solid #38444d; padding: 10px; border-radius: 8px; width: 95%; cursor: pointer; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-merge { background: #00f5d4; color: #000; }
        .status { margin-top: 20px; font-size: 13px; color: #8899a6; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; }
        .success-text { color: #00f5d4; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2><i class="fas fa-random"></i> DYNAMIC KEY MERGER V3.1</h2>
    <div class="upload-group">
        <label>1. MASTER FILE (Base Database)</label>
        <input type="file" id="masterFile" accept=".xlsx">
    </div>
    <div class="upload-group" style="border-left-color: #ffae00;">
        <label>2. SYNC FILE (New Data)</label>
        <input type="file" id="syncFile" accept=".xlsx">
    </div>
    <button id="mergeBtn" class="btn-merge" onclick="processMerge()">START HIGH-SPEED MERGE</button>
    <div id="status" class="status">Ready to process large datasets...</div>
</div>

<script>
    function normalize(name) {
        return name ? name.toString().toLowerCase().replace(/[^a-z0-9]/g, "") : "";
    }

    async function processMerge() {
        const mFile = document.getElementById('masterFile').files[0];
        const sFile = document.getElementById('syncFile').files[0];
        const status = document.getElementById('status');

        if (!mFile || !sFile) { alert("Professor, please select both files."); return; }

        status.innerHTML = "Reading and indexing files...";
        try {
            const masterRaw = await readFile(mFile);
            const syncRaw = await readFile(sFile);

            // Hash Map for O(1) lookup speed
            const syncMap = new Map();
            for (let j = 1; j < syncRaw.length; j++) {
                let name = normalize(syncRaw[j][0]);
                if (name) syncMap.set(name, syncRaw[j][1]);
            }

            let updatedCount = 0;
            // Process data
            for (let i = 1; i < masterRaw.length; i++) {
                let masterSiteName = normalize(masterRaw[i][0]);
                if (syncMap.has(masterSiteName)) {
                    masterRaw[i][2] = syncMap.get(masterSiteName); // Key Column
                    updatedCount++;
                }
            }

            status.innerHTML = `<span class="success-text">Merge Successful!</span><br>Sites updated: ${updatedCount}`;
            downloadExcel(masterRaw);
        } catch (err) {
            status.innerHTML = "Error: " + err.message;
        }
    }

    function readFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(e.target.result, { type: 'binary' });
                resolve(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" }));
            };
            reader.readAsBinaryString(file);
        });
    }

    function downloadExcel(data) {
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Merged_Data");
        XLSX.writeFile(wb, "Professor_Merged_Master_V3.1.xlsx");
    }
</script>
</body>
</html>
