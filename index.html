<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phoenix Master Merger</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b131e; color: #e1e8ed; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #15202b; padding: 25px; border-radius: 15px; border: 1px solid #00d2ff; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00d2ff; text-align: center; }
        .upload-group { margin-bottom: 20px; border-left: 4px solid #00d2ff; padding-left: 15px; }
        input { background: #192734; color: white; border: 1px solid #38444d; padding: 10px; border-radius: 8px; width: 95%; margin-top: 5px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #00f5d4; color: #000; }
        .status { margin-top: 20px; font-size: 13px; color: #8899a6; }
    </style>
</head>
<body>
<div class="card">
    <h2>PHOENIX MASTER MERGER</h2>
    <div class="upload-group">
        <label>Existing Master File</label>
        <input type="file" id="masterFile" accept=".xlsx">
    </div>
    <div class="upload-group" style="border-left-color: #ffae00;">
        <label>New Data File</label>
        <input type="file" id="newFile" accept=".xlsx">
    </div>
    <button onclick="processMerge()">GENERATE COMPLETE MASTER FILE</button>
    <div id="status" class="status">Waiting for files...</div>
</div>

<script>
    async function processMerge() {
        const mFile = document.getElementById('masterFile').files[0];
        const nFile = document.getElementById('newFile').files[0];
        const status = document.getElementById('status');

        if (!mFile || !nFile) { alert("Please select both files."); return; }

        status.innerHTML = "Processing...";
        
        try {
            // ফাইল রিড করা
            const masterData = await readFile(mFile);
            const newData = await readFile(nFile);

            // নতুন ফাইল থেকে ডেটা যুক্ত করা (প্রথম সারি বা হেডার বাদ দিয়ে)
            // newData.slice(1) মানে ২য় সারি থেকে ডেটা নিবে
            const combinedData = masterData.concat(newData.slice(1));

            status.innerHTML = `Success! Merged ${newData.length - 1} new sites. Downloading...`;
            
            // ফাইল ডাউনলোড
            const ws = XLSX.utils.aoa_to_sheet(combinedData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "MasterData");
            XLSX.writeFile(wb, "Complete Master File.xlsx");
        } catch (err) {
            status.innerHTML = "Error: " + err.message;
        }
    }

    function readFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(e.target.result, { type: 'binary' });
                resolve(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: "" }));
            };
            reader.readAsBinaryString(file);
        });
    }
</script>
</body>
</html>
